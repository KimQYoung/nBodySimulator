<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>n-BodySimulation</title>
     <style>
        body {
            margin: 0;
        }
        canvas{display: block; background-color: black;}

        #controlPanel {
            position: absolute;
            top: 30px;
            left: 10px;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px;
            border-radius: 8px;
        }
        #controlPanel input {
            display: block;
            margin: 5px 0;
        }

    </style>
</head>
<body>
    <canvas id="simulationCanvas"></canvas>
    <div id="controlPanel">
        <h3>새로운 천체 추가</h3>
        <label for="x">X 좌표:</label>
        <input type="number" id="x" placeholder="X 좌표">
        <label for="y">Y 좌표:</label>
        <input type="number" id="y" placeholder="Y 좌표">
        <label for="mass">질량:</label>
        <input type="number" id="mass" placeholder="질량">
        <label for="radius">반지름:</label>
        <input type="number" id="radius" placeholder="크기">
        <label for="vx">X방향 속도(기본 0):</label>
        <input type="number" id="vx" placeholder="X축 처음 속도">
        <label for="vy">Y방향 속도(기본 0):</label>
        <input type="number" id="vy" placeholder="Y축 처음 속도">
        <label for="color">색상(기본 흰색):</label>
        <input type="text" id="color" placeholder="색상 (예: red)">
        <button id="addBodyButton">추가</button>
        <button id="resetButton">초기화</button>
    </div>
    <script src="simulation.js"></script>
</body>
</html>
